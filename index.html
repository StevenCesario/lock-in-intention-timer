<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lock In Intention Timer</title>
    <link rel="stylesheet" href="./styles/style.css">
    <script src="./scripts/script.js" defer></script>
</head>
<body>
    <main class="timer-container">
        <div id="time-display" class="time-display" contenteditable="true" spellcheck="false">
            45:00
        </div>

        <div class="intention-container">
            <label for="intention-input" id="intention-prompt" class="intention-prompt">
                What is your intention for these low-distraction focus minutes?
            </label>
            <label for="intention-input" id="intention-active" class="intention-prompt" hidden>
                Good Luck! 🌱✨
            </label>
            <label for="intention-input" id="intention-end" class="intention-prompt" hidden>
                The minutes have passed.<br>Did you complete the intention you set?<br>Take a few moments to reflect on your estimation ability.<br>It's all growth 🌱
            </label>
            
            <input 
                type="text" 
                id="intention-input" 
                class="intention-input" 
                placeholder="e.g., Complete the first 3 test exam exercises"
                autocomplete="off"
                spellcheck="false"
            >
        </div>
        
        <div class="controls-container">
            <span id="error-message" class="intention-prompt error-display invisible"></span>
            <span id="warning-message" class="intention-prompt warning-display invisible">It is recommended to keep your focus sessions to 60 minutes or less per session</span>
            <button id="start-btn" class="control-btn">Lock In</button>
            <button id="reset-btn" class="control-btn invisible">Reset</button> 
        </div>
    </main>
</body>
</html>
